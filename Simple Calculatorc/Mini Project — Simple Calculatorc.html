<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Mini Project — Simple Calculator</title>
    <style>
        *{
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
        }
        html{
            font-size: 10px;
            font-family: "Urbanist", sans-serif;
        }

        .center{
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            background-color: #DC566D;
/* #ffBB94 */
            & .toppart{
                display: flex;
                gap: 2rem;

                & input{
                    width: 20rem;
                    padding: .8rem 1.3rem;
                    border-radius: 3rem;
                    font-weight: 600;
                    font-family: "Poppins", sans-serif;
                    font-size: 1.5rem;  
                }                

                & select{
                    padding: .6rem .8rem;
                    font-weight: 600;
                    font-family: "Poppins", sans-serif;
                    font-size: 1.8rem;
                    border: .3rem solid black;
                    /* background-color: #ffBB94; */
                }
            }

            & .bottempart{

                & button{
                    padding: .8rem 1.3rem;
                    border-radius: 3rem;
                    font-weight: 600;
                    font-family: "Poppins", sans-serif;
                    font-size: 1.5rem;
                    background-color: #ffBB94;
                }
            }

            & p{
                width: 30rem;
                height: auto;
                /* background-color: black; */
                border-radius: 3rem;
                font-weight: 600;
                font-family: "Poppins", sans-serif;
                font-size: 2rem;
                text-align: center;
                background-color: #ffBB94;
            }

        }
    </style>
</head>
<body>
    <div class="center">
        <div class="toppart">

            <input type="number" id="firstnum" placeholder="Enter The 1 Number">
            <select id="opreter">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
                <option value="%">%</option>
                <option value="^">^</option>
            </select>
            <input type="number" id="secnum"  placeholder="Enter The 2 Number">
        </div>

        <div class="bottempart">
            <button id="GAbtn">
                Give answer
            </button>
        </div>
        <p class="answer">= 0</p>

    </div>
        
    <script>

        let cilckbtn = document.getElementById("GAbtn");
        
        function giveAnswer(output){
            let answerp = document.querySelector(".answer").textContent = `= ${output}`;
        };

        cilckbtn.addEventListener("click",() => {
            let a,b;
            a = Number(document.getElementById("firstnum").value);
            b = Number(document.getElementById("secnum").value);
            let opretercho = document.getElementById("opreter").value;
            let result;
            switch(opretercho){
                case "+":
                result = a+b;
                    break;

                case "-":
                result = a-b;
                    break;   

                case "*":
                result = a*b;
                    break;

                case "/":
                    if (b===0) {
                        alert("Error: Divide by 0");
                        result = "Error"; 
                    }
                    else{
                        result = a/b;
                    }
                    break;

                case "%":
                result = a%b;
                    break;

                case "^":
                result = a**b;
                    break;
            }
            giveAnswer(result);
        })

    </script>
</body>
</html>
