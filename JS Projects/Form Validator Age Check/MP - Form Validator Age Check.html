<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Mini Project — Form Validator (Age Check)</title>

    <style>
        *{
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
        }

        html{
            font-size: 10px;
            font-family: "Poppins", sans-serif;
        }

        .center{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 5rem;
            background-color: #6F00FF;

            & .inputform{
                background-color: #FFF1F1;
                width: 30%;
                height: auto;
                display: flex;
                flex-direction: column;
                padding: 3rem 2.7rem;
                font-size: 1.7rem;
                font-weight: 600;
                text-transform: capitalize;
                border-radius: 1.5rem;

                & label{
                    margin: 1.3rem 0 .3rem 1.5rem;
                }
                & input{
                    padding: .8rem 1rem;
                    border-radius: 3rem;
                    font-size: 1.7rem;
                }

                & :nth-child(1){
                    display: flex;
                    flex-direction: column;
                    gap: .7rem;
                }
                & :nth-child(2){
                    display: flex;
                    flex-direction: column;
                    gap: .7rem;
                }
                & :nth-child(3){
                    display: flex;
                    flex-direction: column;
                    gap: .7rem;
                }
            }

            & .btnt{
                width: 100%;
                display: grid;
                place-items: center;
                margin: 3rem 0 0 0 ;

                & button{
                    width: 30%;
                    border-radius: 3rem;
                    padding: .8rem 1rem;
                    font-size: 1.7rem;
                }
            }
        }

        .displaydata{
            width: 40rem;
            height: 20rem;
            padding: 2rem 2.5rem;
            background-color: #FFF1F1;
            text-align: center;
            display: grid;
            place-items: center;
            border-radius: 1.5rem;
            
            & #datastatus{
                font-size: 2rem;
                font-weight: 500;

                & i{
                    color: green;
                }

                & .fa-circle-check{
                    color: green;
                }

                & .fa-circle-xmark{
                    color: red;
                }
            }

            & #showname{
                text-transform: capitalize;
                font-size: 2.5rem;
                font-weight: 700;
            }

            & #showage,#showeailid{
                font-size: 1.7rem;
                font-weight: 500;
            }
             
        }

    </style>
</head>
<body>
    <div class="center">
        <div class="inputform">
            <div class="namefiled">
                <label for="userNameInput">username</label>
                <input type="text" name="username" id="userNameInput" autocomplete="off">
            </div>
            <div class="agefiled">
                <label for="userAgeInput">Age</label>
                <input type="number" name="userage" id="userAgeInput" autocomplete="off">
            </div>
            <div class="emailfild">
                <label for="userEmailInput">Email</label>
                <input type="email" name="useremail" id="userEmailInput" autocomplete="off">
            </div>
            <div class="btnt">
                <button id="btn">
                    Check Data
                </button>
            </div>
        </div>
        <div class="displaydata">
            <p id="datastatus"><i class="fa-solid fa-circle"></i> Enter The Data For Check</p>
            <h2 id="showname">Name :- Fenil Bhalala</h2>
            <p id="showage">Age :- 19 (Adult)</p>
            <p id="showeailid">Email :- fenilbhalala@gmail.com</p>
        </div>
    </div>

    <script>

        let Checkbtn = document.getElementById("btn");
        let person = {
            name: String,
            age : Number,
            agestatus : String,
            emailId : String,
        };
        function validatesAge(a){
            if (a>0 && a<=150) {
                return true        
            } 
            else {
                return false
            }
        }
        function checkAgeStatus(a) {
            if (validatesAge(a)) {
                if (a>=60) {
                    return "Senior Citizen";
                }
                else if (a<=18) {
                    return "Minor";
                }
                else{
                    return "Adult";
                }
            }
            else{
                return "Unvalid Age"
            }
        }
        function checkEmail(em) {
            if(em.includes("@")){
                return true
            }
            else{
                return false
            }
        }

        function btnwork(){
            
            person.name = document.getElementById("userNameInput").value;
            person.age = Number(document.getElementById("userAgeInput").value);
            person.agestatus = checkAgeStatus(person.age);
            person.emailId = document.getElementById("userEmailInput").value;

            if(checkEmail(person.emailId)){
                if(validatesAge(person.age)==true){
                    document.getElementById("datastatus").innerHTML = `<i class="fa-solid fa-circle-check"></i> The Data is valid`; 
                    document.getElementById("showname").textContent = `Name :- ${person.name}`;
                    document.getElementById("showage").textContent = `Age :- ${person.age} (${person.agestatus})`;
                    document.getElementById("showeailid").textContent = `Email :- ${person.emailId}`;
                }
                else{
                    document.getElementById("datastatus").innerHTML = `<i class="fa-solid fa-circle-xmark"></i> The Age is Unvalid`; 
                    document.getElementById("showname").textContent = `Name :- ${person.name}`;
                    document.getElementById("showage").textContent = `Age :- 0 (${person.agestatus})`;
                    document.getElementById("showeailid").textContent = `Email :- ${person.emailId}`;
                }
            }
            else{
                document.getElementById("datastatus").innerHTML = `<i class="fa-solid fa-circle-xmark"></i> The Email Id is Unvalid`; 
                document.getElementById("showname").textContent = `Name :- ${person.name}`;
                document.getElementById("showage").textContent = `Age :- ${person.age} (${person.agestatus})`;
                document.getElementById("showeailid").textContent = `Email :- Enter The valid Email Id`;
            }

        };

        Checkbtn.addEventListener("click",btnwork);

    </script>
</body>
</html>
