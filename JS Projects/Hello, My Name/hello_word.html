<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>hello Word Page</title>
<style>

    *{
        padding: 0%;
        margin: 0%;
        box-sizing: border-box;
    }

    html{
        font-size: 10px;
    }

    .centerdiv{
        background: #420D4b;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 5rem;

        & button{
            padding: 1.2rem 4rem;
            font-size: 3rem;
            font-family: "Poppins", sans-serif;
            font-weight: 500;
            border-radius: 4rem;
            border: .5rem solid #210635;
            color: #210635;
            background-color: #F5D5E0;
        }

        & .magicwords{
            
            & p{
            padding: 1.2rem 4rem;
            font-size: 3rem;
            font-family: "Poppins", sans-serif;
            font-weight: 500;
            border-radius: 4rem;
            border: .5rem solid #210635;
            color: #210635;
            background-color: #F5D5E0;

            }
        }
    }

</style>
</head>
<body>
    <div class="centerdiv">
        <button id="btn">
            Click Me
        </button>
        <div class="magicwords">    
            <p id="para">Magic words Is</p>
        </div>
    </div>

    <script>
        document.getElementById("btn").addEventListener("click",() => {
            alert("Wlecome to My Website My Name iS Fenil Bhalala");
            document.getElementById("para").textContent = "Hello World";
        });
    </script>
</body>
</html>
